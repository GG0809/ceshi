<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟户开户成功通知</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: #fff;
      text-align: center;
      padding: 36px 24px 32px;
    }
    .header .icon {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .header .icon svg { width: 36px; height: 36px; fill: #fff; }
    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
    .header p  { font-size: 14px; opacity: .85; margin-top: 6px; }
    .body { padding: 28px 32px 32px; }
    .info-row {
      display: flex;
      padding: 12px 0;
      border-bottom: 1px dashed #eee;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label {
      width: 110px;
      color: #888;
      flex-shrink: 0;
    }
    .info-row .value {
      flex: 1;
      color: #333;
      font-weight: 500;
      word-break: break-all;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e8f5e9;
      color: #43a047;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #43a047;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }
    .footer { text-align: center; padding: 0 32px 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #43a047, #66bb6a);
      color: #fff;
      border: none;
      padding: 12px 48px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .copyright {
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
    }
    @media (max-width: 480px) {
      .body { padding: 20px 18px 24px; }
      .info-row .label { width: 90px; font-size: 13px; }
      .info-row .value  { font-size: 13px; }
      .header h1        { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <h1>开户成功</h1>
      <p>您的虚拟商户账户已成功开立</p>
    </div>
    <div class="body">
      <div class="info-row">
        <span class="label">商户编号</span>
        <span class="value">10093535337</span>
      </div>
      <div class="info-row">
        <span class="label">商户名称</span>
        <span class="value">枝江市达亲词丙商贸有限公司</span>
      </div>
      <div class="info-row">
        <span class="label">银行名称</span>
        <span class="value">江苏苏商银行</span>
      </div>
      <div class="info-row">
        <span class="label">开户地址</span>
        <span class="value">江苏省南京市</span>
      </div>
      <div class="info-row">
        <span class="label">商户账号</span>
        <span class="value">222</span>
      </div>
      <div class="info-row">
        <span class="label">商户密码</span>
        <span class="value">111</span>
      </div>
      <div class="info-row">
        <span class="label">状态</span>
        <span class="value"><span class="status-badge"><span class="status-dot"></span>成功</span></span>
      </div>
      <div class="info-row">
        <span class="label">开户完成时间</span>
        <span class="value">2026-06-11 11:31:11</span>
      </div>
    </div>
    <div class="footer">
      <a class="btn" href="#">查看开户信息</a>
      <div class="copyright">© 2026 易宝支付 · 虚拟商户开户系统</div>
    </div>
  </div>
</body>
</html>
